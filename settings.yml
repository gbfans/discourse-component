gbfans_site_url:
  default: "https://gbfans.com"
  type: string
  description: "Base URL of the main GBFans Next.js site (no trailing slash)."

brand_name:
  default: "GBFans"
  type: string
  description: "Brand name used in headings and alt text."

logo_url:
  default: "/GBFans-Logo-Wide-Black-BG.png"
  type: string
  description: "Path appended to site URL for the header logo."

footer_logo_url:
  default: "/GBFans-Square-Logo-White-Text.png"
  type: string
  description: "Path appended to site URL for the footer logo."

top_bar_cta_text:
  default: "Become a Supporting Member Today!"
  type: string
  description: "Call-to-action text shown in the desktop top bar."

top_bar_cta_url:
  default: "/supporting"
  type: string
  description: "URL for the top bar CTA link (relative to site URL)."

