    name: "navigation link"
    properties:
      text:
        type: string
        required: true
        validations:
          min_length: 1
          max_length: 100
      url:
        type: string
        required: true
        validations:
          max_length: 2048
      parent:
        type: string
        description: "Leave empty for top-level items. Set to parent item's text for dropdown children."
      target:
        type: enum
        default: _self
        choices:
          - _self
          - _blank

social_links:
  type: objects
  default:
    - name: "Instagram"
      url: "https://instagram.com/gbfans"
      icon: "fab-instagram"
    - name: "Facebook"
      url: "https://facebook.com/gbfans"
      icon: "fab-facebook"
    - name: "X"
      url: "https://x.com/gbfans"
      icon: "fab-x-twitter"
    - name: "YouTube"
      url: "https://youtube.com/c/ghostbustersfans"
      icon: "fab-youtube"
  schema:
    name: "social link"
    properties:
      name:
        type: string
        required: true
      url:
        type: string
        required: true
      icon:
        type: string
        required: true
        description: "Font Awesome icon name (e.g., fab-instagram)"

svg_icons:
  type: list
  list_type: compact
  default: "fab-instagram|fab-facebook|fab-x-twitter|fab-youtube"
  description: "FontAwesome icon classes used by social links. Add any new icons here so Discourse includes them in the icon sprite."

footer_description:
  default: "At GBFans.com, we\u2019re the largest community of passionate Ghostbusters fans, coming together to share news, stories, and resources about the franchise. We offer a Shop where fans can buy prop parts and merchandise, along with detailed tutorials and discussions to help build their own prop replicas like Proton Packs and Ghost Traps."
  type: string
  description: "Community description shown in the footer branding section."

footer_join_url:
  default: "/sign-up/"
  type: string
  description: "URL for the JOIN US link in the footer (relative to site URL)."
